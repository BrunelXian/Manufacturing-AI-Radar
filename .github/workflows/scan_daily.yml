name: scan-daily

on:
  schedule:
    - cron: "15 1 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run raw scanner
        run: python scripts/literature_scanner.py --batch-size 20

      - name: Commit changes if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw_papers.json data/checkpoint.json data/scan_log.txt
          if git diff --cached --quiet; then
            echo "No scanner changes to commit."
            exit 0
          fi
          git commit -m "chore: daily raw literature scan"
          git push
